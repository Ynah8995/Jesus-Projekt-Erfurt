{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h5 class="mb-0">
                    <i class="bi bi-{{ 'plus-circle' if mode == 'add' else 'pencil-circle' }} text-primary me-2"></i>
                    {{ t('add_client', lang) if mode == 'add' else t('edit_client', lang) }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">{{ t('first_name', lang) }} *</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" 
                                   value="{{ client.first_name if client else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">{{ t('last_name', lang) }} *</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" 
                                   value="{{ client.last_name if client else '' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">{{ t('address', lang) }}</label>
                        <input type="text" class="form-control" id="address" name="address" 
                               value="{{ client.address if client else '' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">{{ t('phone', lang) }}</label>
                            <input type="text" class="form-control" id="phone" name="phone" 
                                   value="{{ client.phone if client else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">{{ t('email', lang) }}</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ client.email if client else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="birthday" class="form-label">{{ t('birthday', lang) }} *</label>
                        <input type="date" class="form-control" id="birthday" name="birthday" 
                               value="{{ client.birthday.strftime('%Y-%m-%d') if client else '' }}" required>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="privacy_signed" name="privacy_signed"
                                       {% if client and client.privacy_signed %}checked{% endif %}>
                                <label class="form-check-label" for="privacy_signed">{{ t('privacy_signed', lang) }}</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="photo_permission" name="photo_permission"
                                       {% if client and client.photo_permission %}checked{% endif %}>
                                <label class="form-check-label" for="photo_permission">{{ t('photo_permission', lang) }}</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>{{ t('save', lang) }}
                        </button>
                        <a href="{{ url_for('clients.list_clients') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-2"></i>{{ t('cancel', lang) }}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
