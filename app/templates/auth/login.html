{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-gift-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="mt-3 text-primary">{{ t('app_name', lang) }}</h2>
                    <p class="text-muted">{{ t('app_subtitle', lang) }}</p>
                </div>
                <form method="POST" autocomplete="off">
                    <div class="mb-3">
                        <label for="username" class="form-label">{{ t('username', lang) }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus autocomplete="off">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">{{ t('password', lang) }}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required autocomplete="off">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>{{ t('login', lang) }}
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.change_language', lang='en') }}" class="text-decoration-none me-2">English</a>
                    <span class="text-muted">|</span>
                    <a href="{{ url_for('auth.change_language', lang='de') }}" class="text-decoration-none ms-2">Deutsch</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
