{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h5 class="mb-0">
                    <i class="bi bi-gear text-primary me-2"></i>{{ t('settings', lang) }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('settings.save') }}">
                    <h6 class="text-primary mb-3">
                        <i class="bi bi-envelope me-2"></i>{{ t('email_settings', lang) }}
                    </h6>
                    
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="mail_server" class="form-label">{{ t('smtp_server', lang) }}</label>
                            <input type="text" class="form-control" id="mail_server" name="mail_server" 
                                   value="{{ settings.get('mail_server', 'smtp.gmail.com') }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="mail_port" class="form-label">{{ t('smtp_port', lang) }}</label>
                            <input type="number" class="form-control" id="mail_port" name="mail_port" 
                                   value="{{ settings.get('mail_port', '587') }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="mail_use_tls" name="mail_use_tls"
                                   {% if settings.get('mail_use_tls', 'true') == 'true' %}checked{% endif %}>
                            <label class="form-check-label" for="mail_use_tls">{{ t('use_tls', lang) }}</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="mail_username" class="form-label">{{ t('email_address', lang) }}</label>
                            <input type="email" class="form-control" id="mail_username" name="mail_username" 
                                   value="{{ settings.get('mail_username', '') }}" placeholder="your-email@gmail.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="mail_password" class="form-label">{{ t('app_password', lang) }}</label>
                            <input type="password" class="form-control" id="mail_password" name="mail_password" 
                                   value="{{ settings.get('mail_password', '') }}" placeholder="{{ t('app_password_placeholder', lang) }}">
                            <small class="text-muted">{{ t('app_password_help', lang) }}</small>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="mail_default_sender" class="form-label">{{ t('sender_address', lang) }}</label>
                        <input type="email" class="form-control" id="mail_default_sender" name="mail_default_sender" 
                               value="{{ settings.get('mail_default_sender', '') }}" placeholder="noreply@jesus-projekt-erfurt.de">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>{{ t('save', lang) }}
                        </button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>{{ t('back', lang) }}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
